<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyPhoneDoctor</title>

<style>

body{
  margin:0;
  background:#050816;
  color:white;
  font-family:Arial;
}

.app{
  display:flex;
  height:100vh;
}

.sidebar{
  width:260px;
  background:#0f172a;
  padding:30px;
  border-right:1px solid #1e293b;
}

.sidebar h1{
  margin-bottom:30px;
}

.menu-btn{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

.content{
  flex:1;
  padding:40px;
}

.hero-card{
  background:#111827;
  padding:40px;
  border-radius:24px;
  margin-bottom:30px;
}

#scanBtn{
  padding:16px 28px;
  border:none;
  border-radius:14px;
  background:#2563eb;
  color:white;
  font-size:16px;
  cursor:pointer;
}

#statusText{
  margin-top:30px;
}

.device-card{
  background:#1e293b;
  padding:24px;
  border-radius:20px;
  margin-top:20px;
  border:1px solid #334155;
}

.device-card h2{
  color:#60a5fa;
  margin-bottom:20px;
}

.device-card p{
  margin:8px 0;
}

</style>

</head>

<body>

<div class="app">

  <aside class="sidebar">

    <h1>MyPhoneDoctor</h1>

    <button class="menu-btn">Device Scan</button>
    <button class="menu-btn">Battery Health</button>
    <button class="menu-btn">Storage Cleaner</button>

  </aside>

  <main class="content">

    <div class="hero-card">

      <h2>Android Device Info</h2>

      <p>
        Detect Android phones using ADB.
      </p>

      <button id="scanBtn">
        Start Scan
      </button>

      <div id="statusText"></div>

    </div>

  </main>

</div>

<script src="./app.js"></script>

</body>
</html>
